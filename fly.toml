# Fly.io configuration
app = "auto-extractor-jep"
primary_region = "mia"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    port = 8000

[env]
  PORT = "3000"
  API_PORT = "8000"
